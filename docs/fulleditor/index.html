<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JSYG Full Editor</title>
    <link href="styles.css" rel="stylesheet">
    <script src="../../importmap.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/aria-menus" type="module"></script>
    <script src="script.js" type="module"></script>
  </head>
  <body>
    <menu-bar>
      <menu-item nocaret>
        File
        <menu-list slot="menu">
          <menu-item id="newDocument">New File</menu-item>
          <menu-item id="openDocument">Open SVG File</menu-item>
          <menu-item id="openImage">Open Image File</menu-item>
          <menu-item>Open Example</menu-item>
        </menu-list>
      </menu-item>
      <menu-item nocaret>
        Options
        <menu-list slot="menu">
          <menu-item-checkbox id="editPosition" checked>Edit position</menu-item-checkbox>
          <menu-item-checkbox id="editSize" checked>Edit size</menu-item-checkbox>
          <menu-item-checkbox id="editRotation" checked>Edit rotation</menu-item-checkbox>
          <menu-item-checkbox id="editText" checked>Edit text</menu-item-checkbox>
          <menu-item-checkbox id="editPathMainPoints" checked>Edit paths main points</menu-item-checkbox>
          <menu-item-checkbox id="editPathCtrlPoints">Edit paths control points</menu-item-checkbox>
          <menu-item-checkbox id="autoSmoothPaths">Auto-smooth paths</menu-item-checkbox>
          <menu-item-checkbox id="useTransformAttr">Use transform attribute</menu-item-checkbox>
          <menu-item-checkbox id="keepShapesRatio">Keep Shapes ratio</menu-item-checkbox>
          <menu-item-checkbox id="canvasResizable">Canvas resizable</menu-item-checkbox>
        </menu-list>
      </menu-item>
    </menu-bar>
    <svg id="content"></svg>
  </body>
</html>
