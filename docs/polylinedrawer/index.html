<!doctype html>
<html>
    <head>
        <meta charset="utf-8">
        <title>JSYG tests</title>
        <script src="../../importmap.js"></script>
        <style>
            svg {
                border:1px solid gray;
            }
            path,polyline,polygon {
                fill:none;
                stroke:black;
            }
        </style>
    </head>
    <body>
        <svg width="100%" height="700px">
        </svg>
        shape : 
        <label>
            <input type="radio" name="shape" value="polyline" checked="checked"/> Polyline
        </label>
        <label>
            <input type="radio" name="shape" value="polygon"/> Polygon
        </label>
        
        <script type="module">
            import JSYG from "@jsyg/core";
            import PolylineDrawer from "@jsyg/polylinedrawer";
            
            const pencil = new PolylineDrawer();
            
            JSYG("svg").on("mousedown",function(e) {
               
               if (pencil.inProgress) return;
               
               var shape = JSYG('[name=shape]:checked').val();
                              
               var poly = JSYG('<'+shape+'>').appendTo(this);
               
               pencil.draw(poly,e);
               
            });
            
        </script>
    </body>
</html>
