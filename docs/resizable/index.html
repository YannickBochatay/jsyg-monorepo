<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>JSYG.Resizable</title>
        <script src="../../importmap.js"></script>
        <style>
            html,body {
                margin:0;
                padding:0;
            }
            body {
                height:100vh;
                width:100vw;
                overflow:hidden;
            }
            .container {
                border:1px solid gray;
                height:150px;
                width:100%;
                position:relative;
            }            
        </style>
    </head>
    <body>
        <strong>SVG</strong>
        <svg width="100%" height="150" class="container">
            <rect class="resize" x="10" y="10" width="80" height="40" fill="pink"/>
        </svg>
        size : <span id="posSVG"></span>
        <br/>
        <br/>
        <strong>HTML</strong>
        <div class="container">
            <div class="resize" style="position:absolute;top:10px;left:10px;width:80px;height:40px;background-color:pink"></div>
        </div>
        size : <span id="posHTML"></span>
        <script type="module">           
            import JSYG from "@jsyg/core";
            import "@jsyg/resizable";

            const posSVG = JSYG("#posSVG");
            const posHTML = JSYG("#posHTML");
        
            JSYG(".resize").resizable({
                
                bounds:0,
                
                autoScroll:true,
                
                ondrag:function() {
                    const $this = JSYG(this);
                    const dim = $this.getDim();
                    ($this.isSVG() ? posSVG : posHTML).text( "width:"+dim.width+", height:"+dim.height);
                }
            });
        </script>
    </body>
</html>
