<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
        <title>JSYG tests</title>
        <script src="../../importmap.js"></script>
        <style>
            html,body {
                margin:0;
                padding:0;
            }
            body {
                height:100vh;
                width:100vw;
                overflow:hidden;
            }
            .container {
                border:1px solid gray;
                height:150px;
                width:100%;
                position:relative;
            }            
        </style>
    </head>
    <body>
        <strong>SVG</strong>
        <svg width="100%" height="150" class="container">
            <rect class="drag" x="5%" width="80" height="40" fill="pink"/>
        </svg>
        Position : <span id="posSVG"></span>
        <br/>
        <br/>
        <strong>HTML</strong>
        <div class="container">
            <div class="drag" style="width:80px;height:40px;background-color:pink"></div>
        </div>
        Position HTML : <span id="posHTML"></span>
        <script type="module">
            import JSYG from "@jsyg/core";
            import "@jsyg/draggable";
                
            const posSVG = JSYG("#posSVG");
            const posHTML = JSYG("#posHTML");
        
            JSYG(".drag").draggable({
                
                bounds:0,
                
                autoScroll:true,
                
                ondrag:function() {
                    const $this = JSYG(this);
                    const dim = $this.getDim();
                    ($this.isSVG() ? posSVG : posHTML).text( "x:"+dim.x+", y:"+dim.y);
                }
            });
        </script>
    </body>
</html>
