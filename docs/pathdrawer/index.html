<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>JSYG.PathDrawer</title>
        <script src="../importmap.js"></script>
        <style>
            html,body {
                margin:0;
                padding:0;
            }
            body {
                height:100vh;
                width:100vw;
                overflow:hidden;
            }
            svg {
                border:1px solid gray;
            }
            path {
                fill:none;
                stroke:black;
            }
        </style>
    </head>
    <body>
        <svg width="100%" height="90%">
        </svg>
        Method : 
        <label>
            <input type="radio" name="method" value="point2point" checked="checked"/> Point to point
        </label>
        <label>
            <input type="radio" name="method" value="freehand"/> Free Hand
        </label>
        
        <script type="module">
            import PathDrawer from "@jsyg/pathdrawer";
            import Path from "@jsyg/path";
            import $ from "jquery";

            const pencil = new PathDrawer();
            
            $('[name=method]').on("change",function() {
                if (this.checked) pencil.type = this.value;
            }).trigger("change");
            
            $("svg").on("mousedown",function(e) {
               
               if (pencil.inProgress) return;
               
               const path = new Path();
               path.appendTo(this);
               
               pencil.draw(path,e);
            });
        </script>
    </body>
</html>
