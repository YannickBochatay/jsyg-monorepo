<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>JSYG.PathDrawer</title>
        <script type="importmap">
        {
            "imports": {
                "jquery": "../../node_modules/jquery/dist-module/jquery.module.min.js",
                "pathseg": "../../node_modules/pathseg/pathseg.js",
                "@jsyg/wrapper": "../../node_modules/@jsyg/wrapper/index.js",
                "@jsyg/point": "../../node_modules/@jsyg/point/index.js",
                "@jsyg/vect": "../../node_modules/@jsyg/vect/index.js",
                "@jsyg/matrix": "../../node_modules/@jsyg/matrix/index.js",
                "@jsyg/utils": "../../node_modules/@jsyg/utils/index.js",
                "@jsyg/strutils": "../../node_modules/@jsyg/strutils/index.js",
                "@jsyg/events": "../../node_modules/@jsyg/events/index.js",
                "@jsyg/stdconstruct": "../../node_modules/@jsyg/stdconstruct/index.js",
                "@jsyg/core": "../../node_modules/@jsyg/core/index.js",
                "@jsyg/path": "../../node_modules/@jsyg/path/index.js",
                "@jsyg/pathdrawer": "../../node_modules/@jsyg/pathdrawer/index.js"
            }
        }
        </script>
        <style>
            html,body {
                margin:0;
                padding:0;
            }
            body {
                height:100vh;
                width:100vw;
                overflow:hidden;
            }
            svg {
                border:1px solid gray;
            }
            path {
                fill:none;
                stroke:black;
            }
        </style>
    </head>
    <body>
        <svg width="100%" height="90%">
        </svg>
        Method : 
        <label>
            <input type="radio" name="method" value="point2point" checked="checked"/> Point to point
        </label>
        <label>
            <input type="radio" name="method" value="freehand"/> Free Hand
        </label>
        
        <script type="module">
            import PathDrawer from "@jsyg/pathdrawer";
            import Path from "@jsyg/path";
            import $ from "jquery";

            const pencil = new PathDrawer();
            
            $('[name=method]').on("change",function() {
                if (this.checked) pencil.type = this.value;
            }).trigger("change");
            
            $("svg").on("mousedown",function(e) {
               
               if (pencil.inProgress) return;
               
               const path = new Path();
               path.appendTo(this);
               
               pencil.draw(path,e);
            });
        </script>
    </body>
</html>
